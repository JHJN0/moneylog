# Supabase 무료 플랜은 1주일간 API 요청이 없으면 프로젝트가 일시정지된다.
# 주 2회 가벼운 조회를 보내 활동 상태를 유지한다. (anon 키는 공개용이라 노출 무방)
name: Supabase keep-alive

on:
  schedule:
    - cron: "0 3 * * 1,4" # 매주 월·목 12:00 KST
  workflow_dispatch: # Actions 탭에서 수동 실행도 가능

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          curl -sf \
            "https://eowbhyiedtssckbivhua.supabase.co/rest/v1/expenses?select=id&limit=1" \
            -H "apikey: sb_publishable_mKmf1-SJrpWynExHA1DkEQ_rwTBCiDA" \
            -H "Authorization: Bearer sb_publishable_mKmf1-SJrpWynExHA1DkEQ_rwTBCiDA"
